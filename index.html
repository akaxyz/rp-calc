<!DOCTYPE html>

<html>
  
  <head>
    <title>RP Calculator</title>

    <link rel="stylesheet" href="src/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/choices.js/public/assets/styles/choices.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/choices.js/public/assets/scripts/choices.min.js"></script>
  </head>
  
  <body>

    <h1>calculatenator</h1>
    
    <template id="station-template">
      <div class="station">
        
          <button class="remove">Remove</button>
        
          <input class="count" type="number">
        
          <select class="tier"></select>
        
          <div class="items"></div>
        
          <div class="circuit">
              circuit delay:
              <input class="circuitDelay" type="number">
          </div>
        
      </div>
    </template>
    
    <button id="addStationBtn" onclick="addStation()">Add Station</button>
    <button id="sortItemsBtn">Sort Items</button>
    
    <div id="stationContainer">
        <div id="stations"></div>
    </div>
    
    <h2>progress</h2>
    <div id="rpInputs">
        Current RP: <input id="currentRP" type="number" value="0" min="0">
        Target RP: <input id="targetRP" type="number" value="1000" min="0">
        <div id="timeToTarget">Time to reach target: 0s</div>
    </div>
    
    <h2>results</h2>
    <div id="totals"></div>
    <div id="tierResults"></div>

    <script src="src/items.js"></script>
    <script src="src/formulas.js"></script>
    <script src="src/script.js"></script>

  </body>
  
</html>
