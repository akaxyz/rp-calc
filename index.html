<!DOCTYPE html>

<html>
  
  <head>
    <title>RP Calculator</title>

    <link rel="stylesheet" href="src/style.css">
  </head>
  
  <body>

    <h1>RP Calculator</h1>
    
    <template id="station-template">
      <div class="station">
        <label>Tier: <select class="tier"></select></label>
        <div class="items"></div>
        <label class="circuit" style="display:none;">Circuit: <input type="checkbox"></label>
      </div>
    </template>
    
    <button onclick="addStation()">Add Research Station</button>

    <div id="stations"></div>

    <h2>Totals</h2>
    <div id="totals"></div>

    <script src="src/items.js"></script>
    <script src="src/formulas.js"></script>
    <script src="src/script.js"></script>

  </body>
  
</html>
