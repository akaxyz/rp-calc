<!DOCTYPE html>

<html>
  
  <head>
    <title>RP Calculator</title>

    <link rel="stylesheet" href="src/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/choices.js/public/assets/styles/choices.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/choices.js/public/assets/scripts/choices.min.js"></script>
  </head>
  
  <body>

    <h1>RP Calculator</h1>
    
    <template id="station-template">
      <div class="station">
        Tier:
        <select class="tier"></select>
    
        Count:
        <input class="count" type="number" min="1">
    
        <div class="items"></div>
    
        <div class="circuit">
          Circuit Delay:
          <input class="circuitDelay" type="number" min="0">
        </div>
    
        <button class="remove">Remove</button>
      </div>
    </template>
        
    <button onclick="addStation()">Add Research Station</button>

    <div id="stations"></div>

    <h2>Totals</h2>
    <div id="totals"></div>

    <script src="src/items.js"></script>
    <script src="src/formulas.js"></script>
    <script src="src/script.js"></script>

  </body>
  
</html>
